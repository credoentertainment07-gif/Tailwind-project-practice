<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Clone</title>

    <link rel="stylesheet" href="./css/output.css">
</head>
<body class="bg-dark-blue font-sans text-white">

    <header class="bg-dark-blue px-6 py-4 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="flex items-center gap-2 font-bold text-lg">
                
                <div class="bg-light-blue p-2 rounded-lg">
                    <svg class="w-5 h-5" fill="white" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <!-- Nexus -->
            </div>
    
            <!-- Desktop Menu -->
            <ul class="hidden md:flex gap-8 text-slate-300">
                <li><a href="#home" class="hover:text-white transition">Home</a></li>
      
                <li><a href="#services" class="hover:text-white transition">Services</a></li>
      
                <li><a href="#about" class="hover:text-white transition">About</a></li>
      
                <li><a href="#contact" class="hover:text-white transition">Contact</a></li>
    
            </ul>
    
            <div class="flex items-center gap-4">
      
            
                <button class="hidden md:block bg-light-blue px-5 py-2 rounded-lg font-medium hover:bg-blue-600 transition">Get Started</button>

                    <!-- Mobile Hamburger -->         
                <button class="md:hidden p-2 border border-slate-700 rounded-lg">
                
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          
                </button>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="bg-dark-blue px-6 py-16 md:py-24">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
            <div>
      
                <h1 class="text-4xl md:text-6xl font-bold mb-4 leading-tight">
                    Build Your <span class="text-light-blue">Digital</span> Future
                </h1>
      
                <p class="text-slate-400 mb-8 text-lg">Transform your business with cutting-edge solutions that drive growth and innovation in the digital landscape.</p>
      
                <div class="flex flex-col sm:flex-row gap-4">
        
                    <button class="bg-light-blue px-6 py-3 rounded-lg font-medium hover:bg-blue-600 transition">Start Your Journey</button>
        
                    <button class="border border-slate-600 px-6 py-3 rounded-lg font-medium hover:bg-blue-shade transition">Learn More</button>
                </div>
            </div>
           
            <div>
                <img src="./image/Dashboard.jpeg" alt="Dashboard" class="rounded-xl w-full">
            </div>
        </div>
    </section>

</body>
</html>
